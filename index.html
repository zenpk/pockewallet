<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=optional" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=optional" /></noscript>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#ffffff" />
    <title>Pockewallet</title>
    <style>
      body{margin:0;height:100%;overflow:hidden}
      #root{height:100%}
      ._boot{height:100%;display:flex;align-items:center;justify-content:center}
      ._sp{width:1.5rem;height:1.5rem;border:3px solid #e2e8f0;border-top-color:#3182ce;border-radius:50%;animation:_s .6s linear infinite}
      @keyframes _s{to{transform:rotate(360deg)}}
    </style>
  </head>
  <body>
    <div id="root"><div class="_boot"><span class="_sp"></span></div></div>
    <script>performance.mark("html-parsed")</script>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js");
        });
      }
    </script>
  </body>
</html>
